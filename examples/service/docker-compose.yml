services:
  postgres:
    image: postgres:16-alpine
    container_name: goque_example_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: goque_example
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  apply-migrations:
    image: kukymbr/goose-docker:3.26.0
    container_name: goque_example_migrations
    environment:
      GOOSE_DBSTRING: 'postgres://postgres:postgres@postgres:5432/goque_example?sslmode=disable'
      GOOSE_DRIVER: postgres
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: ../..
      dockerfile: examples/service/Dockerfile
    container_name: goque_example_service
    ports:
      - "8080:8080"
    environment:
      GOQUE_DATABASE_DRIVER: postgres
      GOQUE_DATABASE_DSN: "postgres://postgres:postgres@postgres:5432/goque_example?sslmode=disable"
      GOQUE_SERVER_HOST: "0.0.0.0"
      GOQUE_SERVER_PORT: 8080
      GOQUE_QUEUE_WORKERS: 10
      GOQUE_TASKGENERATOR_ENABLED: "true"
      GOQUE_TASKGENERATOR_INTERVAL: 2m
      GOQUE_TASKGENERATOR_MINTASKS: 10
      GOQUE_TASKGENERATOR_MAXTASKS: 15
      # OpenTelemetry configuration
      GOQUE_TRACERCONFIG_HOST: "otel-collector"
      GOQUE_TRACERCONFIG_PORT: 4317
    depends_on:
      apply-migrations:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    container_name: goque_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: goque_loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: goque_promtail
    volumes:
      - ./monitoring/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
      - app
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # UI
      - "4317"        # Внутренний gRPC

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: goque_otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./monitoring/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "8888:8888"   # Prometheus metrics exporter
      - "8889:8889"   # Prometheus metrics scrape endpoint
    depends_on:
      - jaeger
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: goque_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--enable-feature=exemplar-storage" # ВАЖНО! Включаем Exemplars
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - app
      - otel-collector
    restart: unless-stopped


volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:
